name: Profile README Auto-Update

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Update "Last Updated" timestamp ──
      - name: Update timestamp in README
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          # Update the profile-updated badge cache-bust if needed
          echo "Profile last updated: ${TIMESTAMP}" > .last-updated

      # ── Fetch latest blog posts (if RSS feed exists) ──
      - name: Fetch blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://docs.wakeemwilliams.com/feed.xml,https://docs.wakeemwilliams.com/rss.xml"
          max_post_count: 5
          readme_path: ./README.md
          comment_tag_name: "BLOG-POST-LIST"
          template: "- [$title]($url) &mdash; <sub>$date</sub>"
          date_format: "MMM D, YYYY"
        continue-on-error: true
        # If no RSS feed exists yet, this step gracefully skips

      # ── Generate contribution snake SVG ──
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: KeemWilliams
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=4F9E80&color_dots=#161B22,#0D4429,#006D32,#26A641,#4F9E80

      # ── Push snake SVGs to output branch ──
      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Commit README changes (blog posts, timestamp) ──
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update profile README [skip ci]"
            git push
          fi
