<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Wakeem Williams — Founder, Helix Stax | Systems Architect">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="40%" style="stop-color:#1A2332"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F9E80"/>
      <stop offset="100%" style="stop-color:#C4975A"/>
    </linearGradient>
    <style>
      .name { font-family: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif; font-weight: 700; font-size: 42px; fill: #F0F4FF; }
      .role { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-weight: 400; font-size: 18px; fill: #8896B3; }
      .tagline { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 14px; fill: #4F9E80; }
      .mark-bar { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
      .mark-bar:nth-child(1) { animation-delay: 0.3s; }
      .mark-bar:nth-child(2) { animation-delay: 0.5s; }
      .mark-bar:nth-child(3) { animation-delay: 0.7s; }
      .mark-bar:nth-child(4) { animation-delay: 0.9s; }
      @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg-grad)"/>

  <!-- Accent line under name -->
  <rect x="80" y="188" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Name -->
  <text class="name" x="80" y="140">Wakeem Williams</text>

  <!-- Role -->
  <text class="role" x="80" y="220">Founder, Helix Stax  |  Systems Architect</text>

  <!-- Tagline -->
  <text class="tagline" x="80" y="260">Operations  ·  Infrastructure  ·  Automation  ·  CTGA</text>

  <!-- 4-bar mark — right side -->
  <g transform="translate(980, 80) scale(0.28)">
    <polygon class="mark-bar" points="196,131 316,131 292,183 172,183" fill="#C4975A"/>
    <polygon class="mark-bar" points="157.5,197 354.5,197 330.5,249 133.5,249" fill="#72C4A6"/>
    <polygon class="mark-bar" points="119.5,263 392.5,263 368.5,315 95.5,315" fill="#52A882"/>
    <polygon class="mark-bar" points="81,329 431,329 407,381 57,381" fill="#357A5C"/>
  </g>

  <!-- Bottom gradient line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)"/>
</svg>
